<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="stylesheet" href="./src/style.css"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>redact-showcase — on-device PII redaction</title>
</head>
<body>
<main id="app">
  <header class="masthead">
    <div class="pill" id="status" data-state="idle">
      <span class="dot"></span>
      <span class="status-text">Model not loaded</span>
    </div>
    <h1>Redact PII <span class="accent">in your browser.</span></h1>
    <p class="subtitle">
      A transformer runs entirely on your device via WebGPU — no text ever
      leaves this tab. Load the model, paste something, hit redact.
    </p>
  </header>

  <section class="download" id="download" hidden>
    <div class="download-head">
      <span class="panel-label">Downloading model weights</span>
      <span class="download-total" id="download-total">0%</span>
    </div>
    <div class="download-bar"><div class="download-fill" id="download-fill"></div></div>
    <ul class="download-files" id="download-files"></ul>
  </section>

  <section class="workspace">
    <div class="panel">
      <div class="panel-head">
        <span class="panel-label">Input</span>
        <button class="ghost" id="example">Try an example</button>
      </div>
      <textarea
        class="input-area"
        spellcheck="false"
        placeholder="Paste a block of text containing names, emails, phone numbers, addresses…"
      ></textarea>
    </div>

    <div class="action">
      <button id="action" class="primary" data-mode="load">
        <svg class="btn-icon icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
        <svg class="btn-icon icon-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        <svg class="btn-icon icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-3.5-7.1" opacity=".9"/></svg>
        <span class="btn-label">Load model</span>
      </button>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span class="panel-label">Output</span>
        <span class="panel-meta" id="stats"></span>
      </div>
      <div id="output" class="output-area" data-placeholder="Redacted text appears here."></div>
    </div>
  </section>

  <footer class="footer">
    <code>openai/privacy-filter</code>
    <span>·</span>
    <span>token-classification</span>
    <span>·</span>
    <span>q4 · WebGPU</span>
  </footer>
</main>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
